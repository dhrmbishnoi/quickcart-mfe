<section class="card p-3">
  <div class="d-flex justify-content-between align-items-center mb-2">
    <h3 class="h6 mb-0">Cart Items</h3>
    <button type="button" class="btn btn-sm btn-primary" (click)="addItem()">Add Item</button>
  </div>

  @if (items().length === 0) {
    <p class="mb-0">No items in cart.</p>
  } @else {
    <ul class="list-group list-group-flush">
      @for (item of items(); track item.id) {
        <li class="list-group-item d-flex justify-content-between align-items-center px-0">
          <div>
            <div class="fw-semibold">{{ item.name }}</div>
            <small>Qty: {{ item.quantity }} x {{ item.price | currency: 'USD' }}</small>
          </div>
          <button type="button" class="btn btn-sm btn-outline-danger" (click)="removeItem(item)">
            Remove
          </button>
        </li>
      }
    </ul>
  }
</section>
